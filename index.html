<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ергенско — Дейвид Иванов</title>
<style>
  :root{
    --red:#c8102e;
    --red-dark:#8e0b20;
    --black:#0d0d0d;
    --panel:#1a1a1a;
    --line:#333;
    --text:#f2f2f2;
    --muted:#b3b3b3;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 0%, rgba(200,16,46,.25), transparent 45%),
      var(--black);
    color:var(--text);
    font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;
    justify-content:center;
    padding:24px 16px 60px;
  }
  .card{
    width:100%;
    max-width:520px;
    background:var(--panel);
    border:1px solid var(--line);
    border-top:6px solid var(--red);
    border-radius:16px;
    padding:32px 26px;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
  }
  header{text-align:center;margin-bottom:28px}
  h1{
    margin:0;
    font-size:2.4rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--red);
    text-shadow:0 2px 8px rgba(200,16,46,.4);
  }
  .subtitle{
    margin:8px 0 0;
    color:var(--muted);
    font-size:1.05rem;
    letter-spacing:1px;
  }
  .divider{
    height:2px;
    width:60px;
    background:var(--red);
    margin:16px auto 0;
    border-radius:2px;
  }
  label{
    display:block;
    margin:18px 0 6px;
    font-weight:600;
    font-size:.95rem;
  }
  input,select,textarea{
    width:100%;
    padding:12px 14px;
    background:var(--black);
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--text);
    font-size:1rem;
    outline:none;
    transition:border-color .2s;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--red)}
  textarea{resize:vertical;min-height:70px}
  select{appearance:none;cursor:pointer}
  button{
    margin-top:26px;
    width:100%;
    padding:14px;
    background:var(--red);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:1.05rem;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    transition:background .2s,transform .1s;
  }
  button:hover{background:var(--red-dark)}
  button:active{transform:scale(.98)}
  button:disabled{opacity:.6;cursor:not-allowed}
  #status{
    margin-top:16px;
    text-align:center;
    font-size:.95rem;
    min-height:20px;
  }
  .ok{color:#4ade80}
  .err{color:#f87171}
  .required{color:var(--red)}
</style>
</head>
<body>
  <div class="card">
    <header>
      <h1>Ергенско</h1>
      <p class="subtitle">Дейвид Иванов &nbsp;·&nbsp; 11–13.09.2026</p>
      <div class="divider"></div>
    </header>

    <form id="form">
      <label for="name">Име <span class="required">*</span></label>
      <input type="text" id="name" name="name" placeholder="Твоите име и фамилия" required>

      <label for="drink">Какво ще пиеш? <span class="required">*</span></label>
      <select id="drink" name="drink" required>
        <option value="" disabled selected>Избери напитка…</option>
        <option>Бира</option>
        <option>Уиски</option>
        <option>Водка</option>
        <option>Ракия</option>
      </select>

      <label for="meat">Предпочитание за месо <span class="required">*</span></label>
      <select id="meat" name="meat" required>
        <option value="" disabled selected>Избери месо…</option>
        <option>Пилешко</option>
        <option>Свинско</option>
      </select>

      <label for="allergies">Алергии / не ядеш нещо?</label>
      <textarea id="allergies" name="allergies" placeholder="Напиши ако имаш алергии или нещо, което не ядеш (иначе остави празно)"></textarea>

      <button type="submit" id="submit">Изпрати</button>
      <div id="status"></div>
    </form>
  </div>

<script>
  // ==== НАСТРОЙКИ НА TELEGRAM БОТА ====
  const BOT_TOKEN = "8828057205:AAGB6IdnXFRuWDzxOSkzUIa_OYg6EX4EJww";
  const CHAT_ID   = "1094560495";
  // ====================================

  const form = document.getElementById("form");
  const statusEl = document.getElementById("status");
  const submitBtn = document.getElementById("submit");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    statusEl.textContent = "Изпращане…";
    statusEl.className = "";
    submitBtn.disabled = true;

    const name = document.getElementById("name").value.trim();
    const drink = document.getElementById("drink").value;
    const meat = document.getElementById("meat").value;
    const allergies = document.getElementById("allergies").value.trim() || "—";

    const text =
      "🎉 Ергенско — нова заявка\n\n" +
      "👤 Име: " + name + "\n" +
      "🥃 Напитка: " + drink + "\n" +
      "🍖 Месо: " + meat + "\n" +
      "⚠️ Алергии/не яде: " + allergies;

    try {
      const res = await fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: CHAT_ID, text: text })
      });
      const data = await res.json();
      if (data.ok) {
        statusEl.textContent = "✅ Благодарим! Отговорът е изпратен.";
        statusEl.className = "ok";
        form.reset();
      } else {
        throw new Error(data.description || "Грешка");
      }
    } catch (err) {
      statusEl.textContent = "❌ Възникна грешка. Опитай пак. (" + err.message + ")";
      statusEl.className = "err";
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
